<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>地球 3D 無人機 · 世界 50 大地景巡航</title>
<meta name="description" content="駕駛虛擬無人機飛越真實 3D 地球，巡航世界 50 個知名地景：珠穆朗瑪峰、大峽谷、金字塔、馬丘比丘、雪梨歌劇院……真實衛星影像與真實地形。">
<meta property="og:type" content="website">
<meta property="og:title" content="地球 3D 無人機 · 世界 50 大地景巡航">
<meta property="og:description" content="駕駛虛擬無人機飛越真實 3D 地球，巡航世界 50 個知名地景，真實衛星影像與真實地形。">
<meta property="og:locale" content="zh_TW">
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.css">
<style>
  :root{
    --panel-bg: rgba(10,20,35,.86);
    --accent: #3fc1c9;
    --accent2: #ffd166;
    --text: #eef6fb;
    --bar-h: 58px;
  }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{ width:100%; height:100%; overflow:hidden; font-family:"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif; background:#02060d; }
  #map{ position:fixed; inset:0; }

  /* ---------- 左側地景導覽（可收合） ---------- */
  #panel{
    position:fixed; top:12px; left:12px; bottom:calc(var(--bar-h) + 20px); width:230px;
    background:var(--panel-bg); border-radius:16px; color:var(--text);
    display:flex; flex-direction:column; backdrop-filter:blur(8px);
    box-shadow:0 4px 18px rgba(0,0,0,.45); z-index:20;
    transition:transform .3s ease, opacity .3s ease;
  }
  #panel.hidden{ transform:translateX(-260px); opacity:0; pointer-events:none; }
  #panel h2{ font-size:14px; padding:12px 14px 8px; color:var(--accent2); }
  #panel h2 small{ color:#9fc1d4; font-weight:normal; }
  #list{ flex:1; overflow-y:auto; padding:0 8px 10px; }
  #list::-webkit-scrollbar{ width:5px; } #list::-webkit-scrollbar-thumb{ background:#3b566e; border-radius:3px; }
  .grp{ position:sticky; top:0; background:rgba(10,20,35,.95); color:var(--accent); font-size:12px;
    padding:6px 8px 4px; border-bottom:1px solid rgba(255,255,255,.08); z-index:1; }
  .item{
    display:flex; align-items:center; gap:8px;
    padding:7px 8px; border-radius:10px; cursor:pointer; font-size:13px;
    transition:background .15s;
  }
  .item:hover{ background:rgba(255,255,255,.1); }
  .item.active{ background:rgba(63,193,201,.25); outline:1px solid var(--accent); }
  .item .flag{ flex:none; }
  .item .nm{ flex:1; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }

  #panelToggle{
    position:fixed; top:12px; left:12px; z-index:21;
    width:42px; height:42px; border-radius:12px; border:none;
    background:var(--panel-bg); color:var(--text); font-size:18px; cursor:pointer;
    box-shadow:0 4px 12px rgba(0,0,0,.4); transition:left .3s ease;
  }
  #panelToggle.open{ left:254px; }

  /* ---------- 靠近地景時的大名稱橫幅 ---------- */
  #banner{
    position:fixed; top:18px; left:50%; transform:translate(-50%,-90px);
    background:linear-gradient(135deg, rgba(10,25,45,.92), rgba(20,60,80,.92));
    border:1px solid rgba(63,193,201,.6); border-radius:16px;
    color:#fff; padding:10px 26px; text-align:center; z-index:25;
    box-shadow:0 6px 24px rgba(0,0,0,.5); backdrop-filter:blur(8px);
    transition:transform .45s cubic-bezier(.2,.9,.3,1.2), opacity .35s; opacity:0; pointer-events:none;
  }
  #banner.show{ transform:translate(-50%,0); opacity:1; }
  #banner .bn{ font-size:22px; font-weight:700; letter-spacing:1px; }
  #banner .bc{ font-size:12px; color:var(--accent2); margin-top:2px; }

  /* ---------- 資訊卡 ---------- */
  #info{
    position:fixed; right:12px; bottom:calc(var(--bar-h) + 20px); width:290px; max-width:calc(100vw - 24px);
    background:var(--panel-bg); border-radius:16px; color:var(--text);
    padding:14px 16px; backdrop-filter:blur(8px); z-index:20;
    box-shadow:0 4px 16px rgba(0,0,0,.45); display:none;
  }
  #info.show{ display:block; }
  #info .county{ font-size:11px; color:#0b1c2c; background:var(--accent2); border-radius:6px; padding:2px 8px; display:inline-block; }
  #info h3{ font-size:17px; margin:6px 0 6px; color:#fff; }
  #info p{ font-size:12.5px; line-height:1.7; color:#cfe3ee; }
  #info .close{ position:absolute; top:8px; right:12px; cursor:pointer; color:#89a9bc; font-size:16px; border:none; background:none; }

  /* ---------- 底部操作列 ---------- */
  #bar{
    position:fixed; left:50%; bottom:10px; transform:translateX(-50%);
    height:var(--bar-h); max-width:calc(100vw - 20px);
    background:var(--panel-bg); border-radius:16px; z-index:22;
    display:flex; align-items:center; gap:10px; padding:0 14px;
    box-shadow:0 4px 18px rgba(0,0,0,.5); backdrop-filter:blur(8px);
  }
  .btn{
    background:rgba(255,255,255,.07); color:var(--text); border:none; border-radius:12px;
    padding:9px 13px; font-size:13px; cursor:pointer; transition:background .15s;
    font-family:inherit; white-space:nowrap;
  }
  .btn:hover{ background:rgba(63,193,201,.35); }
  .btn.on{ background:rgba(63,193,201,.5); outline:1px solid var(--accent); }
  .sliderBox{ color:#bcd6e4; font-size:11px; text-align:center; line-height:1.2; }
  .sliderBox input{ width:86px; accent-color:var(--accent); display:block; margin:3px auto 0; }
  #altBox b{ font-size:15px; color:var(--accent2); font-variant-numeric:tabular-nums; white-space:nowrap; }

  /* ---------- 操作說明浮層 ---------- */
  #helpOverlay{
    position:fixed; inset:0; z-index:40; background:rgba(2,8,16,.72);
    display:none; align-items:center; justify-content:center; backdrop-filter:blur(4px);
  }
  #helpOverlay.show{ display:flex; }
  #helpCard{
    background:var(--panel-bg); border-radius:18px; color:var(--text);
    padding:24px 30px; max-width:520px; width:calc(100vw - 40px);
    box-shadow:0 10px 40px rgba(0,0,0,.6); border:1px solid rgba(63,193,201,.35);
  }
  #helpCard h3{ color:var(--accent2); margin-bottom:12px; font-size:17px; }
  #helpCard table{ width:100%; border-collapse:collapse; font-size:13px; }
  #helpCard td{ padding:5px 6px; border-bottom:1px solid rgba(255,255,255,.08); color:#cfe3ee; }
  #helpCard td:first-child{ color:#fff; white-space:nowrap; width:42%; }
  #helpCard kbd{ background:rgba(255,255,255,.12); border-radius:5px; padding:1px 7px; font-family:inherit; font-size:12px; border:1px solid rgba(255,255,255,.2); }
  #helpCard .ok{ display:block; margin:16px auto 0; }

  /* ---------- 地景標記 ---------- */
  .mk{ cursor:pointer; text-align:center; }
  .mk .dot{ width:12px; height:12px; margin:0 auto; border-radius:50%;
    background:var(--accent2); border:2px solid #fff; box-shadow:0 0 8px rgba(255,209,102,.9); }
  .mk .lbl{ margin-top:3px; font-size:11px; color:#fff; background:rgba(10,20,35,.75);
    padding:1px 7px; border-radius:8px; white-space:nowrap; display:none; }
  body.zoomed .mk .lbl, .mk:hover .lbl{ display:inline-block; }

  #loading{
    position:fixed; inset:0; background:#02060d; z-index:99;
    display:flex; flex-direction:column; gap:14px; align-items:center; justify-content:center;
    color:#9fc1d4; font-size:15px; letter-spacing:2px; transition:opacity .6s;
  }
  #loading .globe{ font-size:52px; animation:spin 3s linear infinite; }
  @keyframes spin{ from{ transform:rotate(0) } to{ transform:rotate(360deg) } }

  .maplibregl-ctrl-attrib{ font-size:10px; }

  @media (max-width: 860px){
    #panel{ width:200px; }
    #panelToggle.open{ left:224px; }
    #bar{ gap:6px; padding:0 8px; }
    .btn{ padding:8px 9px; font-size:12px; }
    .sliderBox{ display:none; }
    #altBox{ display:block; }
    #banner .bn{ font-size:17px; }
    #info{ bottom:calc(var(--bar-h) + 16px); width:240px; }
  }
</style>
</head>
<body>
<div id="map"></div>

<button id="panelToggle" class="open" aria-label="開關地景導覽">☰</button>
<div id="panel">
  <h2>🌏 世界 50 大地景 <small>點選即飛往</small></h2>
  <div id="list"></div>
</div>

<div id="banner"><div class="bn" id="bannerName"></div><div class="bc" id="bannerCountry"></div></div>

<div id="info">
  <button class="close" id="infoClose">✕</button>
  <span class="county" id="infoCountry"></span>
  <h3 id="infoName"></h3>
  <p id="infoDesc"></p>
</div>

<div id="bar">
  <button class="btn" id="btnTour" title="自動依序巡航 50 個地景">▶️ 自動巡航</button>
  <button class="btn" id="btnPrev" title="上一個地景">⏮</button>
  <button class="btn" id="btnNext" title="下一個地景">⏭</button>
  <button class="btn" id="btnHome" title="回到太空看整個地球">🌍 地球全景</button>
  <div class="sliderBox">飛行速度<input type="range" id="speed" min="0.3" max="3" step="0.1" value="1"></div>
  <div class="sliderBox" id="altBox">無人機海拔<br><b id="alt">—</b></div>
  <button class="btn" id="btnHelp" title="鍵盤與滑鼠操作說明">❓ 操作說明</button>
</div>

<div id="helpOverlay">
  <div id="helpCard">
    <h3>🕹️ 無人機操作說明</h3>
    <table>
      <tr><td>🖱️ 滑鼠<b>左鍵</b>拖曳</td><td>平移（移動無人機位置）</td></tr>
      <tr><td>🖱️ 滑鼠<b>右鍵</b>拖曳</td><td>旋轉視角、調整俯仰角</td></tr>
      <tr><td>🖱️ 滑鼠<b>滾輪</b></td><td>前進（俯衝拉近）／後退（爬升拉遠）</td></tr>
      <tr><td><kbd>W</kbd>/<kbd>S</kbd> 或 <kbd>↑</kbd>/<kbd>↓</kbd></td><td>向前／向後飛行</td></tr>
      <tr><td><kbd>A</kbd>/<kbd>D</kbd> 或 <kbd>←</kbd>/<kbd>→</kbd></td><td>左轉／右轉機頭</td></tr>
      <tr><td><kbd>Q</kbd>/<kbd>E</kbd></td><td>鏡頭抬頭／低頭</td></tr>
      <tr><td><kbd>Space</kbd>／<kbd>Shift</kbd></td><td>無人機上升／下降</td></tr>
      <tr><td>👆 觸控</td><td>單指拖曳平移、雙指縮放旋轉</td></tr>
    </table>
    <button class="btn ok" id="helpClose">我知道了，開始飛！</button>
  </div>
</div>

<div id="loading"><div class="globe">🌍</div>正在載入真實地球影像與地形…</div>

<script src="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.js"></script>

/* ---------- 建立地圖：真實衛星影像 + 真實地形 + 3D 地球 ---------- */
const style = {
  version: 8,
  projection: { type: "globe" },
  sources: {
    sat: {
      type: "raster",
      tiles: ["https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"],
      tileSize: 256, maxzoom: 19,
      attribution: "影像 © Esri, Maxar, Earthstar Geographics｜地形 © Mapzen/AWS Terrain Tiles"
    },
    dem: {
      type: "raster-dem",
      tiles: ["https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png"],
      encoding: "terrarium", tileSize: 256, maxzoom: 15
    }
  },
  layers: [{ id: "sat", type: "raster", source: "sat" }],
  terrain: { source: "dem", exaggeration: 1.5 },
  sky: {
    "sky-color": "#79b6f2",
    "horizon-color": "#e8f4ff",
    "sky-horizon-blend": 0.6,
    "atmosphere-blend": ["interpolate", ["linear"], ["zoom"], 0, 1, 8, 1, 10, 0]
  }
};

const map = new maplibregl.Map({
  container: "map",
  style,
  center: [121, 23.5],
  zoom: 1.6,
  pitch: 0,
  bearing: 0,
  maxPitch: 85,
  attributionControl: { compact: true }
});
window._map = map;               // 供除錯與教學觀察
map.keyboard.disable();          // 改用自訂的無人機鍵盤操作
map.touchZoomRotate.enable();
map.dragRotate.enable();         // 滑鼠右鍵拖曳＝旋轉/俯仰

/* ---------- DOM ---------- */
const $ = id => document.getElementById(id);
const listEl = $("list"), panel = $("panel"), toggle = $("panelToggle");
const banner = $("banner"), bannerName = $("bannerName"), bannerCountry = $("bannerCountry");
const info = $("info"), infoName = $("infoName"), infoCountry = $("infoCountry"), infoDesc = $("infoDesc");
const speedInput = $("speed"), altEl = $("alt");
let speedFactor = 1;

/* ---------- 左側清單（依洲分組，可收合） ---------- */
let activeIdx = -1;
(function buildList(){
  let lastGroup = "";
  SPOTS.forEach((s, i) => {
    if (s.g !== lastGroup) {
      lastGroup = s.g;
      const count = SPOTS.filter(x => x.g === s.g).length;
      const g = document.createElement("div");
      g.className = "grp"; g.textContent = `${s.g}（${count}）`;
      listEl.appendChild(g);
    }
    const el = document.createElement("div");
    el.className = "item"; el.dataset.idx = i;
    el.innerHTML = `<span class="flag">${s.f}</span><span class="nm">${s.n}</span>`;
    el.addEventListener("click", () => { stopTour(); flyToSpot(i); });
    listEl.appendChild(el);
  });
})();
function setActive(i){
  activeIdx = i;
  listEl.querySelectorAll(".item").forEach(el => el.classList.toggle("active", +el.dataset.idx === i));
  const el = listEl.querySelector(`.item[data-idx="${i}"]`);
  if (el) el.scrollIntoView({ block: "nearest", behavior: "smooth" });
}
toggle.addEventListener("click", () => {
  const hidden = panel.classList.toggle("hidden");
  toggle.classList.toggle("open", !hidden);
});

/* ---------- 地景標記 ---------- */
SPOTS.forEach((s, i) => {
  const el = document.createElement("div");
  el.className = "mk";
  el.innerHTML = `<div class="dot"></div><div class="lbl">${s.f} ${s.n}</div>`;
  el.addEventListener("click", e => { e.stopPropagation(); stopTour(); flyToSpot(i); });
  new maplibregl.Marker({ element: el, anchor: "center" }).setLngLat([s.lon, s.lat]).addTo(map);
});

/* ---------- 飛往地景 ---------- */
function flyToSpot(i, opts = {}){
  const s = SPOTS[i];
  userInteracted = true;
  setActive(i);
  showInfo(s);
  map.flyTo({
    center: [s.lon, s.lat],
    zoom: s.z, pitch: s.p,
    bearing: opts.bearing !== undefined ? opts.bearing : (Math.random() * 90 - 45),
    speed: 0.75 * speedFactor,
    curve: 1.6,
    essential: true
  });
}
function showInfo(s){
  infoName.textContent = `${s.f} ${s.n}`;
  infoCountry.textContent = s.c;
  infoDesc.textContent = s.d;
  info.classList.add("show");
}
$("infoClose").addEventListener("click", () => info.classList.remove("show"));

/* ---------- 靠近地景時顯示名稱橫幅 ---------- */
function haversineKm(lat1, lon1, lat2, lon2){
  const R = 6371, toRad = x => x * Math.PI / 180;
  const dLat = toRad(lat2 - lat1), dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}
let bannerSpot = null;
function updateBanner(){
  const zoom = map.getZoom();
  document.body.classList.toggle("zoomed", zoom >= 10.5);
  let near = null;
  if (zoom >= 9) {
    const c = map.getCenter();
    let best = Infinity;
    for (const s of SPOTS) {
      const d = haversineKm(c.lat, c.lng, s.lat, s.lon);
      if (d < best) { best = d; near = s; }
    }
    // 越低空（zoom 越大）判定範圍越小，避免遠遠就跳名稱
    const limit = Math.max(6, 2200 / Math.pow(2, zoom - 1));
    if (best > limit) near = null;
  }
  if (near !== bannerSpot) {
    bannerSpot = near;
    if (near) {
      bannerName.textContent = `📍 ${near.f} ${near.n}`;
      bannerCountry.textContent = near.c;
      banner.classList.add("show");
    } else {
      banner.classList.remove("show");
    }
  }
}
map.on("move", updateBanner);

/* ---------- 自動巡航 ---------- */
let touring = false, tourTimer = null, tourIdx = -1;
const btnTour = $("btnTour");
function startTour(){
  touring = true;
  btnTour.classList.add("on");
  btnTour.textContent = "⏸ 暫停巡航";
  nextTourStop();
}
function stopTour(){
  touring = false;
  clearTimeout(tourTimer);
  btnTour.classList.remove("on");
  btnTour.textContent = "▶️ 自動巡航";
}
function nextTourStop(){
  if (!touring) return;
  tourIdx = (activeIdx + 1) % SPOTS.length;
  flyToSpot(tourIdx);
  map.once("moveend", () => {
    if (!touring) return;
    // 停留並環繞一圈感受地形
    const dwell = 5000 / speedFactor;
    const startBearing = map.getBearing(), t0 = performance.now();
    (function orbit(){
      if (!touring || activeIdx !== tourIdx) return;
      const t = performance.now() - t0;
      if (t < dwell) {
        map.setBearing(startBearing + t * 0.012 * speedFactor);
        requestAnimationFrame(orbit);
      }
    })();
    tourTimer = setTimeout(nextTourStop, dwell + 400);
  });
}
btnTour.addEventListener("click", () => touring ? stopTour() : startTour());
$("btnNext").addEventListener("click", () => { stopTour(); flyToSpot((activeIdx + 1) % SPOTS.length); });
$("btnPrev").addEventListener("click", () => { stopTour(); flyToSpot((activeIdx - 1 + SPOTS.length) % SPOTS.length); });
$("btnHome").addEventListener("click", () => {
  stopTour(); info.classList.remove("show"); setActive(-1);
  map.flyTo({ center: [121, 23.5], zoom: 1.6, pitch: 0, bearing: 0, speed: 0.9, essential: true });
});

/* ---------- 防撞山：相機貼進或鑽入地形時自動拉高 ---------- */
function clampCameraAboveTerrain(){
  if (!map.getTerrain()) return;
  try {
    const camAlt = map.transform.getCameraAltitude();
    const qte = typeof map.queryTerrainElevation === "function" ? map.queryTerrainElevation(map.getCenter()) : null;
    const ground = Math.max(map.getCameraTargetElevation() || 0, qte || 0);
    if (camAlt < ground + 120 && map.getZoom() > 3) {
      map.easeTo({ zoom: map.getZoom() - 0.7, duration: 500 });
    }
  } catch (err) { /* 地形資料尚未就緒時略過 */ }
}
map.on("idle", clampCameraAboveTerrain);

/* ---------- 滑桿 ---------- */
speedInput.addEventListener("input", () => speedFactor = +speedInput.value);

/* ---------- 無人機海拔高度顯示 ---------- */
const EXAG = 1.5;   // 與 style.terrain.exaggeration 相同
function updateAltitude(){
  try {
    const camAlt = map.transform.getCameraAltitude();          // 誇張地形世界中的相機高度
    const gWorld = map.getCameraTargetElevation() || 0;        // 誇張後的地面高度
    const realAlt = Math.max(0, camAlt - gWorld + gWorld / EXAG); // 換算回真實海拔
    altEl.textContent = realAlt >= 100000
      ? Math.round(realAlt / 1000).toLocaleString() + " 公里"
      : realAlt >= 10000
        ? (realAlt / 1000).toFixed(1) + " 公里"
        : Math.round(realAlt).toLocaleString() + " 公尺";
  } catch (err) { /* transform 尚未就緒時略過 */ }
}
map.on("move", updateAltitude);
map.on("load", updateAltitude);

/* ---------- 操作說明 ---------- */
$("btnHelp").addEventListener("click", () => $("helpOverlay").classList.add("show"));
$("helpClose").addEventListener("click", () => $("helpOverlay").classList.remove("show"));
$("helpOverlay").addEventListener("click", e => { if (e.target.id === "helpOverlay") $("helpOverlay").classList.remove("show"); });

/* ---------- 鍵盤無人機操作 ---------- */
const keys = {};
window.addEventListener("keydown", e => {
  if (e.target.tagName === "INPUT") return;
  keys[e.code] = true;
  if (["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.code)) e.preventDefault();
  if (e.code !== "Tab") userInteracted = true;
});
window.addEventListener("keyup", e => keys[e.code] = false);

function droneStep(){
  const anyKey = Object.keys(keys).some(k => keys[k]);
  if (!anyKey) return;

  let bearing = map.getBearing(), pitch = map.getPitch(), zoom = map.getZoom();
  const c = map.getCenter();
  let moved = false;

  const turn = 1.6 * speedFactor;
  if (keys.KeyA || keys.ArrowLeft)  { bearing -= turn; moved = true; }
  if (keys.KeyD || keys.ArrowRight) { bearing += turn; moved = true; }
  if (keys.KeyQ) { pitch = Math.min(85, pitch + 1.1); moved = true; }
  if (keys.KeyE) { pitch = Math.max(0, pitch - 1.1); moved = true; }
  if (keys.Space) { zoom = Math.max(1, zoom - 0.02 * speedFactor); moved = true; }        // 上升
  if (keys.ShiftLeft || keys.ShiftRight) { zoom = Math.min(18.5, zoom + 0.02 * speedFactor); moved = true; } // 下降

  let dir = 0;
  if (keys.KeyW || keys.ArrowUp) dir += 1;
  if (keys.KeyS || keys.ArrowDown) dir -= 1;

  let lat = c.lat, lon = c.lng;
  if (dir !== 0) {
    const mpp = 156543.03392 * Math.cos(c.lat * Math.PI / 180) / Math.pow(2, zoom); // 公尺/像素
    const step = mpp * 9 * speedFactor * dir;
    const rad = bearing * Math.PI / 180;
    lat += (step * Math.cos(rad)) / 111320;
    lon += (step * Math.sin(rad)) / (111320 * Math.max(0.05, Math.cos(c.lat * Math.PI / 180)));
    lat = Math.max(-85, Math.min(85, lat));
    moved = true;
  }
  if (moved) {
    map.stop();
    map.jumpTo({ center: [lon, lat], bearing, pitch, zoom });
  }
}

/* ---------- 開場：緩慢自轉的地球 ---------- */
let userInteracted = false;
["mousedown","wheel","touchstart"].forEach(ev =>
  map.getCanvas().addEventListener(ev, () => userInteracted = true, { passive: true }));

(function loop(){
  requestAnimationFrame(loop);
  if (!userInteracted && !touring && map.getZoom() < 4) {
    const c = map.getCenter();
    map.jumpTo({ center: [c.lng + 0.05, c.lat] });
  }
  droneStep();
})();

/* ---------- 載入完成 ---------- */
map.on("load", () => {
  const ld = $("loading");
  ld.style.opacity = "0";
  setTimeout(() => ld.remove(), 700);
});
map.on("error", e => console.warn("map error:", e && e.error));
</script>
